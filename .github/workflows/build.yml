name: Build & Release

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      # ── Debug build (auto-signed, installable) ──────────────────────────
      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Locate APK
        id: apk
        run: |
          APK=$(find app/build/outputs/apk/debug -name "*.apk" | head -1)
          echo "path=$APK" >> $GITHUB_OUTPUT
          echo "name=$(basename $APK)" >> $GITHUB_OUTPUT

      # ── Version tag ─────────────────────────────────────────────────────
      - name: Determine release info
        id: info
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
            echo "tag=$TAG"           >> $GITHUB_OUTPUT
            echo "prerelease=false"   >> $GITHUB_OUTPUT
            echo "title=Release $TAG" >> $GITHUB_OUTPUT
          else
            SHORT="${GITHUB_SHA::7}"
            echo "tag=latest"                          >> $GITHUB_OUTPUT
            echo "prerelease=true"                     >> $GITHUB_OUTPUT
            echo "title=Latest build (${SHORT})"       >> $GITHUB_OUTPUT
          fi

      # ── Create / update release ──────────────────────────────────────────
      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name:   ${{ steps.info.outputs.tag }}
          name:       ${{ steps.info.outputs.title }}
          prerelease: ${{ steps.info.outputs.prerelease }}
          body: |
            **Commit:** `${{ github.sha }}`
            **Branch:** `${{ github.ref_name }}`
            **Built:** ${{ github.event.head_commit.timestamp }}

            > Install the APK directly on your Android device.
            > Enable *Install from unknown sources* in Settings if prompted.
          files: ${{ steps.apk.outputs.path }}
          generate_release_notes: ${{ startsWith(github.ref, 'refs/tags/') }}
