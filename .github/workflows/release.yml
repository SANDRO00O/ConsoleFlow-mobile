name: Build & Release

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Decode Keystore and convert to JKS
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > consoleflow.p12
          keytool -importkeystore \
            -srckeystore consoleflow.p12 \
            -srcstoretype PKCS12 \
            -srcstorepass "$KEYSTORE_PASSWORD" \
            -srcalias consoleflow \
            -destkeystore consoleflow.jks \
            -deststoretype JKS \
            -deststorepass "$KEYSTORE_PASSWORD" \
            -destkeypass "$KEY_PASSWORD" \
            -alias consoleflow \
            -noprompt

      - name: Build Release APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease --no-daemon

      - name: Read Metadata
        id: metadata
        run: |
          NAME=$(jq -r '.release_name' builddata.json)
          BODY=$(jq -r '.release_body' builddata.json)
          PRE=$(jq -r '.is_prerelease' builddata.json)
          APK_NAME=$(jq -r '.apk_name' builddata.json)

          echo "name=$NAME" >> $GITHUB_OUTPUT
          echo "body=$BODY" >> $GITHUB_OUTPUT
          echo "pre=$PRE" >> $GITHUB_OUTPUT
          echo "apk_custom_name=$APK_NAME" >> $GITHUB_OUTPUT

      - name: Locate and Rename APK
        id: apk
        run: |
          ORIGINAL_PATH=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          NEW_NAME="${{ steps.metadata.outputs.apk_custom_name }}"
          NEW_PATH="app/build/outputs/apk/release/$NEW_NAME"

          mv "$ORIGINAL_PATH" "$NEW_PATH"

          echo "path=$NEW_PATH" >> $GITHUB_OUTPUT

      - name: Determine release info
        id: info
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
            echo "tag=$TAG" >> $GITHUB_OUTPUT
            echo "title=${{ steps.metadata.outputs.name }} $TAG" >> $GITHUB_OUTPUT
          else
            echo "tag=latest-build" >> $GITHUB_OUTPUT
            echo "title=${{ steps.metadata.outputs.name }}" >> $GITHUB_OUTPUT
          fi

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.info.outputs.tag }}
          name: ${{ steps.info.outputs.title }}
          prerelease: ${{ steps.metadata.outputs.pre }}
          body: ${{ steps.metadata.outputs.body }}
          files: ${{ steps.apk.outputs.path }}
          generate_release_notes: true